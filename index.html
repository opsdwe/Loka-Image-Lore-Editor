<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loka Image Lore Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content-1">
            <a href="index.html">
                <img src="./assets/logo.png" alt="Loka Logo" width="200">
            </a>
        </div>
        <div class="navbar-content-2">
            <ul>
                <li><a href="index.html">Image Lore</a></li>
                <li><a href="https://lokamc.com/lore" target="_blank">Loka Editor</a></li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <aside class="customize-menu">
            <div class="customize-gap">
                <div class="customize-content-1">
                    <div class="customize-content-all-header">
                        <span>Customize Menu</span>
                    </div>
                    <div class="customize-content-all-explain">
                        <span>Loka Image Lore Generator</span>
                    </div>
                </div>
                <div class="customize-settings">
                    <div class="customize-content-2">
                        <div class="customize-content-header">Photo:</div>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        <button id="uploadBtn">Add photo</button>
                    </div>
                    <div class="customize-content-2">
                        <div class="customize-content-header">ASCII Character:</div>
                        <div class="customize-input-div">
                            <input
                                type="text"
                                id="asciiChar"
                                placeholder="ASCII Character"
                                maxlength="1"
                                value="█"
                            >
                        </div>
                    </div>
                    <div class="customize-content-2">
                        <div class="customize-content-header">Size:</div>
                        <div class="customize-input-div">
                            <input type="number" id="widthInput"  placeholder="Width"  min="1" max="30" value="30">
                            <input type="number" id="heightInput" placeholder="Height" min="1" max="15"  value="15">
                        </div>
                    </div>
                    <div class="customize-content-2">
                        <div class="customize-content-header">Color Mode:</div>
                        <div class="customize-content-button">
                            <button id="hexModeBtn">Hex</button>
                            <button id="normalModeBtn">Normal</button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <main class="preview-menu">
            <div class="mc-preview">
                <div class="preview-header" id="previewHeader">Header</div>
                <div id="previewDivider">---</div>
                <div class="preview-content" id="previewContent">Content</div>
            </div>
            <div class="code-preview">
                <textarea id="codeOutput" placeholder="Lore code area..."></textarea>
            </div>
            <div class="button-preview">
                <button id="updatePreviewBtn">Update</button>
                <button id="copyBtn">Copy</button>
            </div>
        </main>
    </div>
    <canvas id="canvas" style="display: none;"></canvas>
    <script src="main.js"></script>
</body>
</html>
